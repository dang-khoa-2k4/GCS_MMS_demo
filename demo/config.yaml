# =============================================================================
# Configuration for GCS-MMS Motion Planning Demo
# =============================================================================
# This demo implements a hybrid discrete-continuous motion planning framework:
# - Discrete path selection on graph of convex sets (GCS-style)
# - Continuous trajectory optimization via direct multiple shooting
# - On/off convex geometry with Big-M encoding (approximating perspective)
# - Explicit discrete-continuous coupling
#
# Classification: MIOCP (continuous-time) -> MINLP (after transcription)
# =============================================================================

# -----------------------------------------------------------------------------
# Problem Preset
# -----------------------------------------------------------------------------
problem:
  # Geometry presets are registered in problem_data.py
  default_preset: "default"

# -----------------------------------------------------------------------------
# Start and Goal States
# -----------------------------------------------------------------------------
# State format: [px, py, theta] for unicycle model
# Note: theta is heading angle in radians
# These are global defaults and can be overridden per scenario.
start_state:
  position: [0.2, 0.2]
  heading: 0.785  # 45 degrees, pointing toward goal

goal_state:
  position: [4.8, 4.8]
  heading: 0.785  # 45 degrees

# -----------------------------------------------------------------------------
# Dynamics Configuration
# -----------------------------------------------------------------------------
dynamics:
  model: "unicycle"  # Currently only unicycle supported
  
  # State dimension: n_x = 3 (px, py, theta)
  # Control dimension: n_u = 2 (v, omega)
  
  # Control bounds
  v_min: -2.0      # minimum linear velocity
  v_max: 2.0       # maximum linear velocity
  omega_min: -3.14159  # minimum angular velocity (-pi)
  omega_max: 3.14159   # maximum angular velocity (pi)
  
  # Time bounds per region
  delta_min: 0.1   # minimum time in each region
  delta_max: 10.0  # maximum time in each region

# -----------------------------------------------------------------------------
# Control Parameterization
# -----------------------------------------------------------------------------
control:
  # Type of parameterization on each region
  # Options: "constant" (one control per region), "piecewise_constant" (N segments)
  parameterization: "piecewise_constant"
  
  # Number of control segments per region (for piecewise_constant)
  n_segments: 2

# -----------------------------------------------------------------------------
# Multiple Shooting Configuration
# -----------------------------------------------------------------------------
shooting:
  # Number of integration steps for RK4 within each region
  n_integration_steps: 20
  
  # Number of mesh points for safety constraint sampling
  # These are points where we check A_v * x(tau_k) <= b_v - epsilon
  n_mesh_points: 10
  
  # Safety margin epsilon for region containment
  safety_margin: 0.02

# -----------------------------------------------------------------------------
# Cost Function Weights
# -----------------------------------------------------------------------------
# Total cost: sum_v rho_v where
# rho_v >= J_v = a * Delta_v + integral[w_L * ||q_dot||^2 + w_E * ||u||^2] dtau
cost:
  # Time penalty weight (penalizes total trajectory duration)
  a: 1.0
  
  # Velocity/path length penalty weight
  w_L: 1.0
  
  # Control effort penalty weight
  w_E: 1.0

# -----------------------------------------------------------------------------
# Optimizer Configuration
# -----------------------------------------------------------------------------
optimizer:
  # Safety limit for graph-path counting in experiment summaries
  max_paths: 1500
  
  # Solver verbosity/options for the integrated continuous relaxation solve
  ipopt:
    max_iter: 3500
    tol: 1.0e-6
    print_level: 0  # 0=silent, 5=verbose
    
  # Big-M values for on/off constraints
  big_M:
    position: 20.0    # for state bounds
    interface: 20.0   # for coupling constraints
    time: 100.0       # for time variable bounds

# -----------------------------------------------------------------------------
# Visualization Configuration
# -----------------------------------------------------------------------------
visualization:
  # Figure size (inches)
  figsize: [10, 10]
  
  # Colors
  colors:
    workspace: "#f0f0f0"
    obstacles: "#404040"
    regions: "tab10"  # colormap name
    trajectory: "#2196F3"
    start: "#4CAF50"
    goal: "#F44336"
    interface_points: "#FF9800"
    mesh_points: "#9C27B0"
  
  # Whether to show mesh points on trajectory
  show_mesh_points: true
  
  # Animation settings
  animation:
    fps: 30
    duration: 5.0  # seconds

# -----------------------------------------------------------------------------
# Experiment Scenarios
# -----------------------------------------------------------------------------
scenarios:
  # Scenario-specific parameter changes should go under `overrides`.
  # Supported examples:
  #   overrides.shooting.n_mesh_points
  #   overrides.control.n_segments
  #   overrides.cost.a
  #   overrides.optimizer.ipopt.max_iter
  # You can also override `problem_preset`, `start_state`, and `goal_state`.
    
  default:
    name: "Default Environment"
    description: "Default map with hand-crafted convex safe regions"
    active_regions: "all"
    problem_preset: "default"
    overrides:
      shooting:
        n_mesh_points: 5
    
  maze:
    name: "Maze Environment"
    description: "Maze map with all active regions"
    active_regions: "all"
    problem_preset: "maze"
    overrides:
      shooting:
        n_mesh_points: 5

# -----------------------------------------------------------------------------
# Output Configuration
# -----------------------------------------------------------------------------
output:
  # Directory for results (relative to demo folder)
  results_dir: "results"
  
  # File formats
  save_png: true
  save_gif: true
  save_json: true  # save numeric results
  
  # Verbosity level (0=quiet, 1=normal, 2=verbose)
  verbosity: 1
